name: Flask CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USER }}/myflaskapp:latest .
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Build and test
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
        run: |
          docker build -t $DOCKER_USER/myflaskapp:latest .
          docker run -d -p 5000:5000 --name testflaskapp $DOCKER_USER/myflaskapp:latest
          sleep 5
          if curl -s http://127.0.0.1:5000 | grep "Hello from Flask app"; then
            echo "Test passed"
          else
            echo "Test failed"
            exit 1
          fi
          docker stop testflaskapp
          docker rm testflaskapp

  publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Login and push to DockerHub
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
          docker build -t $DOCKER_USER/myflaskapp:latest .
          docker push $DOCKER_USER/myflaskapp:latest

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v3
      - name: Deploy
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
        run: |
          docker pull $DOCKER_USER/myflaskapp:latest
          docker run -d -p 5000:5000 --name flaskapp $DOCKER_USER/myflaskapp:latest
          echo "Deployed."
