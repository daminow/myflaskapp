name: Flask CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build image
        run: docker build -t tdaminov/myflaskapp:latest .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Build and test
        run: |
          docker build -t tdaminov/myflaskapp:latest .
          docker run -d -p 5000:5000 --name testflaskapp tdaminov/myflaskapp:latest
          sleep 5
          if curl -s http://127.0.0.1:5000 | grep "Hello from Flask app"; then
            echo "Test passed"
          else
            echo "Test failed"
            exit 1
          fi
          docker stop testflaskapp
          docker rm testflaskapp

  publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Login and push to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "tdaminov" --password-stdin
          docker build -t tdaminov/myflaskapp:latest .
          docker push tdaminov/myflaskapp:latest

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v3
      - name: Deploy
        run: |
          docker pull tdaminov/myflaskapp:latest
          docker run -d -p 5000:5000 --name flaskapp tdaminov/myflaskapp:latest
          echo "Deployed."
